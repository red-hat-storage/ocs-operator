name: Dependabot refresh

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.DEPENDABOT_REFRESH_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Refresh deps, vendor, CRDs, and CSV
        run: |
          make deps-update
          make update-generated
          make gen-latest-csv

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: ${{ secrets.DEPENDABOT_REFRESH_GIT_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.DEPENDABOT_REFRESH_GIT_EMAIL }}
        run: |
          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"

          paths=(
            go.mod go.sum go.work go.work.sum
            api/go.mod api/go.sum
            metrics/go.mod metrics/go.sum
            services/provider/api/go.mod services/provider/api/go.sum
            vendor/
            api config/crd/bases deploy/csv-templates deploy/ocs-operator
          )
          git add "${paths[@]}"

          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -s -m "Add generated files for dependency update"
          git push
