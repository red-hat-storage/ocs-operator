version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - "/"
      - "/api"
      - "/metrics"
      - "/services/provider/api"
    schedule:
      interval: daily
    open-pull-requests-limit: 0
    groups:
      go-security:
        applies-to: security-updates
        group-by: dependency-name
        patterns:
          - "*"
          
