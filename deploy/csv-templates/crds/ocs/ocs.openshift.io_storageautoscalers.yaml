    - description: Last Run Time Stamp
      jsonPath: .status.lastRunTimeStamp
      name: LastRunTimeStamp
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: StorageAutoScaler represents the automatic storage scaling for
          storage cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StorageAutoScalerSpec defines the desired state of StorageAutoScaler
            properties:
              deviceClassName:
                default: ssd
                description: DeviceClassName is the name of the device class for which
                  the storage scaling is to be done.
                type: string
              deviceClassStorageCapacityLimit:
                anyOf:
                - type: integer
                - type: string
                description: DeviceClassStorageCapacityLimit is the capacity limit
